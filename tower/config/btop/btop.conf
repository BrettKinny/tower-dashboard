#? Config file for btop v. 1.4.7
# Minimal layout for small tmux pane in unraid-dash (TL pane ~75x22)
shown_boxes = "cpu mem net proc"
update_ms = 2000
proc_sorting = "cpu lazy"
proc_per_core = False
proc_mem_bytes = True
cpu_graph_upper = "Auto"
cpu_graph_lower = "Auto"
show_disks = true
io_mode = true
use_fstab = false
# Edit disks_filter for your array — Unraid's /etc/fstab doesn't list the
# array mounts (managed by shfs/mdadm), so without the filter the disks/io
# section renders empty. List as many /mnt/disk* entries as you have.
disks_filter = "/mnt/disk1 /mnt/disk2 /mnt/disk3 /mnt/disk4 /mnt/cache /mnt/user"

# Cohesive aesthetic: defer to terminal palette (omarchy theme via SSH)
color_theme = "TTY"
theme_background = False
truecolor = False
